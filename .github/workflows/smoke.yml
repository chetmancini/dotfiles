name: Smoke

on:
  push:
  pull_request:

jobs:
  shell-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install shell tools
        run: |
          sudo apt-get update && sudo apt-get install -y zsh shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Check shell formatting
        run: make shell-format-check

      - name: Check bash scripts
        run: make shell-syntax

      - name: ShellCheck shell scripts
        run: make shellcheck

      - name: Lint TOML configs
        run: make toml-lint

      - name: Check zsh config
        run: make zsh-check

  install-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Prepare bootstrap fixtures
        run: |
          mkdir -p "$GITHUB_WORKSPACE/oh-my-zsh/custom/themes"
          mkdir -p "$RUNNER_TEMP/home"
          mkdir -p "$RUNNER_TEMP/home-plan"

      - name: Preview installer
        env:
          HOME: ${{ runner.temp }}/home-plan
        run: |
          echo "existing git config" > "$HOME/.gitconfig"
          ./install.sh --plan --yes --skip-brew --skip-api-keys --no-clear
          test -f "$HOME/.gitconfig"
          test ! -L "$HOME/.gitconfig"

      - name: Run installer
        env:
          HOME: ${{ runner.temp }}/home
        run: ./install.sh --yes --skip-brew --skip-api-keys --no-clear

      - name: Run doctor
        env:
          HOME: ${{ runner.temp }}/home
        run: bin/doctor --skip-tools --strict
